<!DOCTYPE html>
<html>
<head>
    <title>AI Inference Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e272e; color: #d2dae2; padding: 40px; }
        .container { display: flex; gap: 20px; max-width: 900px; margin: auto; }
        .panel { background: #2f3640; padding: 30px; border-radius: 10px; width: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { border-bottom: 2px solid #e1b12c; padding-bottom: 10px; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; margin-top: 20px; transition: 0.3s; }
        .btn-view { background: #00a8ff; color: white; }
        .btn-view:hover { background: #0097e6; }
        .btn-cart { background: #e84118; color: white; }
        .btn-cart:hover { background: #c23616; }
        .btn-reset { background: #718093; color: white; margin-top: 10px;}
        #result-box { margin-top: 20px; padding: 15px; background: #e1b12c; color: #2f3640; border-radius: 5px; display: none; }
        .history-log { background: #000; padding: 10px; font-family: monospace; font-size: 12px; height: 150px; overflow-y: auto; color: #4cd137; margin-top: 10px;}
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #fbc531;">⚙️ AI Risk Engine: Inference Dashboard</h1>

    <div class="container">
        <div class="panel">
            <h2>User Simulator</h2>
            
            <label>Session User ID (Change to reset history)</label>
            <input type="text" id="userId" value="demo_user_001">

            <label>Product Price ($)</label>
            <input type="number" id="price" value="150.00">

            <label>Category</label>
            <select id="category">
                <option value="Apparel">Apparel</option>
                <option value="Electronics">Electronics</option>
                <option value="Home">Home</option>
            </select>

            <div style="display: flex; gap: 10px;">
                <button class="btn-view" onclick="sendEvent('view')">👀 Simulate 'View'</button>
                <button class="btn-cart" onclick="sendEvent('cart')">🛒 Simulate 'Add to Cart'</button>
            </div>
            <button class="btn-reset" onclick="resetUser()">Generate New User</button>
        </div>

        <div class="panel">
            <h2>AI Telemetry</h2>
            <p style="margin-top: 0;"><strong>Action Log:</strong></p>
            <div id="history" class="history-log">Waiting for action...</div>
            
            <div id="result-box">
                <p style="font-size: 18px; margin: 5px 0;" id="ai-score"><b>AI Risk Score:</b> --</p>
                <p style="font-size: 18px; margin: 5px 0;" id="ai-action"><b>Action Router:</b> --</p>
            </div>
        </div>
    </div>

    <script>
        function resetUser() {
            document.getElementById('userId').value = "demo_user_" + Math.floor(Math.random() * 10000);
            document.getElementById('history').innerHTML = "New user generated. History cleared.";
            document.getElementById('result-box').style.display = "none";
        }

        async function sendEvent(eventType) {
            const userId = document.getElementById('userId').value;
            const price = parseFloat(document.getElementById('price').value);
            const category = document.getElementById('category').value;
            const historyLog = document.getElementById('history');

            // Log the action to the screen
            historyLog.innerHTML += `<br>> [${new Date().toLocaleTimeString()}] Sent ${eventType.toUpperCase()} for $${price}`;
            historyLog.scrollTop = historyLog.scrollHeight; // Auto-scroll to bottom

            // EXACT PAYLOAD FROM YOUR ORIGINAL CODE
            const payload = {
                user_id: userId,
                user_visit_number: 1,
                event_type: eventType,
                price: price,
                category: category,
                brand: "Nike", 
                timestamp: new Date().toISOString()
            };

            try {
                // EXACT FETCH COMMAND FROM YOUR ORIGINAL CODE
                const response = await fetch("http://127.0.0.1:8080/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                // Update UI with AI results
                document.getElementById('result-box').style.display = "block";
                document.getElementById('ai-score').innerHTML = `<b>AI Risk Score:</b> ${data.probability}`;
                document.getElementById('ai-action').innerHTML = `<b>Action Router:</b> ${data.action}`;

                // EXACT POPUP LOGIC FROM YOUR ORIGINAL CODE (Only fires on Cart click)
                if (eventType === 'cart') {
                    setTimeout(() => {
                        if (data.action.includes("Trigger")) {
                            alert("🚨 AI POPUP TRIGGERED:\n\nWait! You left this in your cart. Take 10% off if you checkout right now!");
                        } else if (data.action.includes("Block")) {
                            alert("🛑 AI DECISION:\n\nWindow Shopper detected. Suppressing all discounts. Let them browse.");
                        } else {
                            alert("✅ AI DECISION:\n\nSafe Buyer. Let them proceed to standard checkout.");
                        }
                    }, 500);
                }

            } catch (error) {
                historyLog.innerHTML += `<br><span style='color:red'>❌ Error: Could not reach the AI. Is your main.py server running?</span>`;
            }
        }
    </script>
</body>
</html>
