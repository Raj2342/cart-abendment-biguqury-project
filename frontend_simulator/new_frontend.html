<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart Abandonment Simulator</title>
<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
.container { max-width:900px; margin:40px auto; background:#fff; padding:20px; border-radius:10px; }
h2 { margin-bottom:10px; }
.row { display:flex; gap:10px; margin-bottom:15px; }
input, select { padding:8px; flex:1; }
button { padding:10px; cursor:pointer; border:none; border-radius:6px; font-weight: bold;}
.primary { background:#007bff; color:white; }
.success { background:#28a745; color:white; }
.warning { background:#ffc107; color:black; }
.danger { background:#dc3545; color:white; }
.result { margin-top:20px; padding:15px; border-radius:8px; background:#eef2f7; font-family: monospace; font-size: 14px;}
</style>
</head>
<body>
<div class="container">
<h2>Cart Abandonment Simulation</h2>

<div class="row">
<input id="session" placeholder="Session ID" readonly>
<input id="time" placeholder="Event Time" readonly>
</div>

<div class="row">
<select id="category"></select>
<select id="product"></select>
</div>

<div class="row">
<select id="userType">
<option value="new">New User</option>
<option value="return">Returning User</option>
</select>
</div>

<div class="row">
<button class="primary" onclick="triggerEvent('view')">👁️ View</button>
<button class="success" onclick="triggerEvent('cart')">🛒 Add to Cart</button>
<button class="success" onclick="triggerEvent('cart_finalized')" style="background-color: #20c997;">✅ CART FINALIZED</button>
<button class="danger" onclick="fastForwardTime()">⏳ Fast Forward 3 Mins</button>
</div>

<div class="result" id="log"></div>

<div class="row">
<div style="flex:1;">
<label><strong>NUMBER OF ITEMS IN CART</strong></label>
<input id="items" readonly>
</div>
<div style="flex:1;">
<label><strong>CART TOTAL VALUE</strong></label>
<input id="total" readonly>
</div>
</div>

<div class="row">
<button class="warning" onclick="resetAll()">🔄 Generate New User</button>
<button class="primary" onclick="simulate()" style="width: 50%;">🧠 Simulate</button>
</div>

<div class="result" id="result"></div>

</div>

<script>
// JARVIS FIX: Simulated time tracking
let simulatedTime = new Date();
function generateProducts(category){
  let arr = [];
  for(let i=1;i<=10;i++){
    arr.push({ name: category + " Item " + i, price: Math.floor(Math.random()*100+10) });
  }
  return arr;
}

const data = {
  "Electronics": generateProducts("Electronics"),
  "Clothing": generateProducts("Clothing"),
  "Home Appliances": generateProducts("Home Appliances"),
  "Books": generateProducts("Books"),
  "Beauty": generateProducts("Beauty"),
  "Sports": generateProducts("Sports"),
  "Toys": generateProducts("Toys"),
  "Groceries": generateProducts("Groceries"),
  "Furniture": generateProducts("Furniture"),
  "Accessories": generateProducts("Accessories")
};

let cartItems = 0; let cartTotal = 0; let eventLog = [];

function init(){
  const catSelect = document.getElementById("category");
  Object.keys(data).forEach(c=>{
    let opt=document.createElement("option"); opt.value=c; opt.text=c; catSelect.appendChild(opt);
  });
  catSelect.addEventListener("change", updateProducts);
  updateProducts();
  resetAll();
}

function updateProducts(){
  const category = document.getElementById("category").value;
  const prodSelect=document.getElementById("product");
  prodSelect.innerHTML="";
  data[category].forEach(p=>{
    let opt=document.createElement("option"); opt.value=p.price; opt.text=p.name + " ($" + p.price + ")"; prodSelect.appendChild(opt);
  });
}

// JARVIS FIX: To test the 180 seconds logic instantly!
function fastForwardTime() {
    simulatedTime = new Date(simulatedTime.getTime() + (190 * 1000));
// Adds 190 seconds (3 mins 10 secs)
    document.getElementById("time").value = simulatedTime.toLocaleTimeString();
    eventLog.push({time: simulatedTime.toLocaleTimeString(), product: "--- ⏳ 3 MINUTES LATER ---", type: "TIME_SKIP"});
    renderLog();
}

// JARVIS FIX: Unified function passing correct simulated TIME
async function triggerEvent(type){ 
  const productSelect = document.getElementById("product");
  const productName = productSelect.options[productSelect.selectedIndex].text;
  const category = document.getElementById("category").value;
  
  // Advance time by 5 seconds per normal click
  simulatedTime = new Date(simulatedTime.getTime() + 5000);
  document.getElementById("time").value = simulatedTime.toLocaleTimeString();
  
  let displayName = productName;
  if(type === 'cart_finalized') displayName = "CHECKOUT PAGE REACHED";
  eventLog.push({time: simulatedTime.toLocaleTimeString(), product: displayName, type: type.toUpperCase()});

  if(type === 'cart'){
      cartItems++;
      cartTotal += parseFloat(productSelect.value);
      document.getElementById("items").value = cartItems;
      document.getElementById("total").value = cartTotal;
  }

  renderLog();

  // Sending the SIMULATED TIME as parameter to Backend
  await fetch("http://localhost:8080/track", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
          session_id: document.getElementById("session").value,
          event_type: type,
          category: category,
          product: productName,
          event_time: 
simulatedTime.toISOString() // Explicit Time sent!
      })
  });
}

function resetAll(){
  eventLog = [];
  cartItems = 0; cartTotal = 0;
  simulatedTime = new Date(); // Reset time
  document.getElementById("log").innerHTML = "";
  document.getElementById("session").value = "S-"+Math.floor(Math.random()*10000);
  document.getElementById("time").value = simulatedTime.toLocaleTimeString();
  document.getElementById("items").value = "0";
  document.getElementById("total").value = "0";
  document.getElementById("result").innerHTML = "";
}

function renderLog(){
  let html = "<b>EVENT LOG:</b><br>";
  eventLog.forEach(e=>{
      if(e.type === "TIME_SKIP") html += `<span style="color:red;"><b>${e.time} | ${e.product}</b></span><br>`;
      else if(e.type === "CART_FINALIZED") html += `<span style="color:green;"><b>${e.time} | ${e.product} | ${e.type}</b></span><br>`;
      else html += `${e.time} | ${e.product} | <b>${e.type}</b><br>`;
  });
  document.getElementById("log").innerHTML = html;
}

async function simulate(){
  document.getElementById("result").innerHTML = "🧠 Jarvis is running XGBoost...";
  const response = await fetch("http://localhost:8080/predict", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: document.getElementById("session").value })
  });
  const data = await response.json();
  
  let feats = data.features ? JSON.stringify(data.features, null, 2) : "None";
  document.getElementById("result").innerHTML = `Prediction: <b><span style='color: #007bff; font-size: 1.2em;'>${data.action}</span></b><br><br><pre style="background:#222; color:#0f0; padding:10px;">Backend Calculated Features:\n${feats}</pre>`;
}

init();
</script>
</body>
</html>
